name: Mirror TraderMonty Market Data

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

concurrency:
  group: mirror-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch CSVs
        run: |
          mkdir -p latest
          curl --retry 3 --retry-delay 5 --max-time 30 -f -o latest/market_breadth_data.csv \
            "https://tradermonty.github.io/market-breadth-analysis/market_breadth_data.csv"
          curl --retry 3 --retry-delay 5 --max-time 30 -f -o latest/market_breadth_summary.csv \
            "https://tradermonty.github.io/market-breadth-analysis/market_breadth_summary.csv"
          curl --retry 3 --retry-delay 5 --max-time 30 -f -o latest/uptrend_ratio_timeseries.csv \
            "https://raw.githubusercontent.com/tradermonty/uptrend-dashboard/main/data/uptrend_ratio_timeseries.csv"
          curl --retry 3 --retry-delay 5 --max-time 30 -f -o latest/sector_summary.csv \
            "https://raw.githubusercontent.com/tradermonty/uptrend-dashboard/main/data/sector_summary.csv"

      - name: Commit and push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/ChenheZhang2022/tradermonty-data.git

          git pull --rebase --autostash origin main

          git add latest/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update market data $(date -u +%Y-%m-%d)"

          pushed=false
          for i in 1 2 3; do
            if git push origin main; then
              pushed=true
              break
            fi
            echo "Push attempt ${i} failed, re-pulling and retrying..."
            git pull --rebase origin main
            sleep 3
          done
          if [ "$pushed" = false ]; then
            echo "ERROR: All push attempts failed"
            exit 1
          fi
