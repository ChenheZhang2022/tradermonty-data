name: Mirror TraderMonty Market Data

on:
  schedule:
    - cron: '25 13 * * 1-5'  # 9:25 AM ET (EDT)
  workflow_dispatch:

# 🔒 关键：避免多个 workflow 同时写 main
concurrency:
  group: market-data-sync
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch market breadth CSVs
        run: |
          curl --retry 3 --retry-delay 5 -f -o market_breadth_data.csv \
            "https://tradermonty.github.io/market-breadth-analysis/market_breadth_data.csv"

          curl --retry 3 --retry-delay 5 -f -o market_breadth_summary.csv \
            "https://tradermonty.github.io/market-breadth-analysis/market_breadth_summary.csv"

      - name: Fetch uptrend CSVs
        run: |
          curl --retry 3 --retry-delay 5 -f -o uptrend_ratio_timeseries.csv \
            "https://raw.githubusercontent.com/tradermonty/uptrend-dashboard/main/data/uptrend_ratio_timeseries.csv"

          curl --retry 3 --retry-delay 5 -f -o sector_summary.csv \
            "https://raw.githubusercontent.com/tradermonty/uptrend-dashboard/main/data/sector_summary.csv"

      - name: Commit and push (safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(data): refresh market data"

          git push origin main