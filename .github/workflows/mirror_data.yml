name: Mirror TraderMonty Market Data

on:
  schedule:
    - cron: '25 13 * * 1-5'  # 9:25 AM ET (EDT) — 5 min before CCR skills run
  workflow_dispatch:           # Allow manual trigger

permissions:
  contents: write              # Required to commit and push CSV files

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch market breadth CSVs
        run: |
          curl -f -o market_breadth_data.csv \
            "https://tradermonty.github.io/market-breadth-analysis/market_breadth_data.csv"
          curl -f -o market_breadth_summary.csv \
            "https://tradermonty.github.io/market-breadth-analysis/market_breadth_summary.csv"

      - name: Fetch uptrend CSVs
        run: |
          curl -f -o uptrend_ratio_timeseries.csv \
            "https://raw.githubusercontent.com/tradermonty/uptrend-dashboard/main/data/uptrend_ratio_timeseries.csv"
          curl -f -o sector_summary.csv \
            "https://raw.githubusercontent.com/tradermonty/uptrend-dashboard/main/data/sector_summary.csv"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update market data $(date -u +%Y-%m-%d)" && git push
